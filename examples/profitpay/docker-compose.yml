# ===========================================
# ProfitPay - ASP.NET Core + MSSQL
# Интеграция с Nginx Proxy Manager
# ===========================================
#
# Миграция с nginx-certbot:
# 1. Остановите старый nginx-certbot
# 2. Добавьте сервис к proxy-network (уже сделано в этом файле)
# 3. Запустите: docker compose up -d
# 4. В NPM создайте Proxy Host:
#    - Domain: profitpay.yourdomain.com
#    - Forward Hostname: profitpay-api
#    - Forward Port: 5000
#    - Включите SSL

services:
  # ===========================================
  # API приложение
  # ===========================================
  profitpay-api:
    image: your-registry/profitpay-api:latest
    container_name: profitpay-api
    restart: unless-stopped
    depends_on:
      profitpay-db:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
      # Connection string к MSSQL
      - ConnectionStrings__DefaultConnection=Server=profitpay-db;Database=ProfitPay;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=true
      # Другие настройки приложения
      - Logging__LogLevel__Default=Information
    volumes:
      # Логи приложения (опционально)
      - ./logs:/app/logs
    networks:
      - proxy-network  # Доступ через NPM
      - internal       # Связь с БД
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # Microsoft SQL Server
  # ===========================================
  profitpay-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: profitpay-db
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Express  # или Developer, Standard, Enterprise
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - internal  # Только внутренняя сеть!
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================
  # Фронтенд (если отдельно)
  # ===========================================
  # profitpay-frontend:
  #   image: your-registry/profitpay-frontend:latest
  #   container_name: profitpay-frontend
  #   restart: unless-stopped
  #   networks:
  #     - proxy-network
  #   # В NPM:
  #   # Forward Hostname: profitpay-frontend
  #   # Forward Port: 80

volumes:
  mssql-data:

networks:
  proxy-network:
    external: true
  internal:
    driver: bridge

# ===========================================
# .env файл для этого docker-compose:
# ===========================================
# MSSQL_SA_PASSWORD=YourStrong!Password123
# ===========================================

