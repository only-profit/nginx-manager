# ===========================================
# Prometheus Configuration
# ===========================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'server-proxy-manager'

# Alerting configuration (uncomment if using Alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files
rule_files:
  # - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # ===========================================
  # Prometheus itself
  # ===========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ===========================================
  # Node Exporter - host metrics
  # ===========================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ===========================================
  # Nginx Proxy Manager
  # ===========================================
  # NPM doesn't expose metrics by default
  # You can use nginx-prometheus-exporter:
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']

  # ===========================================
  # Your applications
  # ===========================================
  # ASP.NET Core apps with prometheus-net:
  # - job_name: 'myapp'
  #   static_configs:
  #     - targets: ['myapp-api:5000']
  #   metrics_path: /metrics

  # ===========================================
  # Docker containers (with cAdvisor)
  # ===========================================
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # ===========================================
  # PostgreSQL (with postgres_exporter)
  # ===========================================
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # ===========================================
  # Redis (with redis_exporter)
  # ===========================================
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

