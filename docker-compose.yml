# Server Proxy Manager - Nginx Proxy Manager
# https://nginxproxymanager.com/

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      # HTTP
      - "${HTTP_PORT:-80}:80"
      # HTTPS
      - "${HTTPS_PORT:-443}:443"
      # Admin Web UI
      - "${ADMIN_PORT:-81}:81"
    environment:
      # Uncomment to disable IPv6 if needed
      # DISABLE_IPV6: 'true'
      
      # Database configuration (uses SQLite by default)
      # For MySQL/MariaDB, uncomment and configure:
      # DB_MYSQL_HOST: "db"
      # DB_MYSQL_PORT: 3306
      # DB_MYSQL_USER: "npm"
      # DB_MYSQL_PASSWORD: "${DB_PASSWORD}"
      # DB_MYSQL_NAME: "npm"
      TZ: ${TIMEZONE:-UTC}
    volumes:
      # Configuration and data
      - ./data:/data
      # Let's Encrypt certificates
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "/bin/check-health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy-network:
    external: true
    name: proxy-network

